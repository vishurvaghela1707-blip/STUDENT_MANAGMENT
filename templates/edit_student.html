<!DOCTYPE html>
<html>

<head>

<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Edit Student</h2>

<form action="/update/{{student[0]}}" method="POST">

<div class="mb-3">

<label>Name</label>

<input type="text" name="name" class="form-control" value="{{student[1]}}" required>

</div>

<div class="mb-3">

<label>Email</label>

<input type="email" name="email" class="form-control" value="{{student[2]}}" required>

</div>

<div class="mb-3">

<label>Phone</label>

<input type="text" name="phone" class="form-control" value="{{student[3]}}" required>

</div>

<div class="mb-3">

<label>Course</label>

<input type="text" name="course" class="form-control" value="{{student[4]}}" required>

</div>

<button class="btn btn-success">Update Student</button>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</form>

</div>

</body>

</html>
