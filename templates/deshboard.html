<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
display:flex;
}

.sidebar{
width:250px;
height:100vh;
background:#343a40;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin:10px 0;
}

.sidebar a:hover{
background:#495057;
border-radius:5px;
}

.content{
flex:1;
padding:20px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h3>Admin Panel</h3>

<a href="/dashboard">
<i class="fa fa-home"></i> Dashboard
</a>

<a href="/attendance/{{s[0]}}" class="btn btn-info btn-sm">
Attendance
</a>

<a href="/edit/{{s[0]}}" class="btn btn-warning btn-sm">
Edit
</a>



<a href="#">
<i class="fa fa-user-plus"></i> Add Student
</a>

<a href="#">
<i class="fa fa-users"></i> Student List
</a>

<a href="#">
<i class="fa fa-calendar-check"></i> Attendance
</a>

<a href="/">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>

<!-- Content -->

<div class="content">

<h2>Student Management</h2>

<form action="/add" method="POST" class="mb-4">

<input class="form-control mb-2" type="text" name="name" placeholder="Name">

<input class="form-control mb-2" type="text" name="email" placeholder="Email">

<input class="form-control mb-2" type="text" name="phone" placeholder="Phone">

<input class="form-control mb-2" type="text" name="course" placeholder="Course">

<button class="btn btn-primary">Add Student</button>

</form>

<table class="table table-bordered">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Course</th>
<th>Action</th>

</tr>


<tr>

<td>{{student[0]}}</td>
<td>{{student[1]}}</td>
<td>{{student[2]}}</td>
<td>{{student[3]}}</td>
<td>{{student[4]}}</td>

<td>

<a href="/edit/{{s[0]}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{s[0]}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>


</table>

</div>

</body>
</html>
